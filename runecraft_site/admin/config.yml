# Legacy Decap CMS config retained for reference.
# The active admin UI is index.html + admin.js and saves through netlify/functions/board.js.
backend:
  name: github
  repo: dawi118/RuneCraft
  branch: main

media_folder: "runecraft_site/assets/uploads"
public_folder: "assets/uploads"
publish_mode: editorial_workflow

collections:
  - name: "project_data"
    label: "Project Data"
    files:
      - name: "board"
        label: "Lumber Yard Board"
        file: "runecraft_site/data/board.json"
        format: "json"
        fields:
          - label: "Board Items"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} - {{fields.location}} - {{fields.progress}}%"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Unique slug, e.g. varrock-core. Use lowercase letters, numbers and hyphens." }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "subtitle", widget: "text" }
              - label: "Status"
                name: "location"
                widget: "select"
                options:
                  - { label: "Backlog", value: "backlog" }
                  - { label: "In Progress", value: "progress" }
                  - { label: "Done", value: "done" }
              - label: "Region"
                name: "region"
                widget: "select"
                options:
                  - "Misthalin"
                  - "Asgarnia"
                  - "Kandarin"
                  - "Morytania"
                  - "Kharidian Desert"
                  - "Fremennik Province"
                  - "Wilderness"
                  - "Karamja"
                  - "Tirannwn Great Kourend"
                  - "Varlamore"
              - label: "Type"
                name: "category"
                widget: "select"
                options:
                  - { label: "Landscape", value: "landscape" }
                  - { label: "Monument", value: "monument" }
                  - { label: "Building", value: "building" }
                  - { label: "Infrastructure", value: "infrastructure" }
                  - { label: "Other", value: "other" }
              - { label: "Progress (%)", name: "progress", widget: "number", min: 0, max: 100, value_type: "int" }
              - { label: "Estimated build time (hours)", name: "estimatedTotalTime", widget: "number", min: 0, value_type: "float" }
              - { label: "Estimated time left", name: "estimatedTimeLeft", widget: "string", required: false }
              - { label: "Progress update", name: "what", widget: "markdown", required: false }
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Image caption", name: "caption", widget: "string", required: false }
